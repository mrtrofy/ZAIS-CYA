<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FashionStock - Modern Slate Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        .hidden { display: none; }
        .cat-scroll::-webkit-scrollbar { height: 4px; }
        .cat-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#f1f5f9] text-slate-800">

    <nav class="bg-white shadow-sm sticky top-0 z-50 border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-slate-800 p-2 rounded-lg text-white">
                    <i data-lucide="shopping-bag" class="w-5 h-5"></i>
                </div>
                <span class="text-xl font-bold text-slate-800 tracking-tight">FashionStock</span>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="switchTab('store')" class="text-sm font-semibold text-slate-600 hover:text-slate-900">Tienda</button>
                <button onclick="checkAdminAuth()" class="text-sm font-semibold border-l pl-4 border-slate-200 text-slate-600 hover:text-slate-900">Admin</button>
                <button onclick="toggleCart()" class="relative p-2 bg-slate-100 rounded-full hover:bg-slate-200 transition-colors">
                    <i data-lucide="shopping-cart" class="w-5 h-5 text-slate-700"></i>
                    <span id="cart-count" class="absolute -top-1 -right-1 bg-slate-800 text-white text-[10px] font-bold rounded-full h-4 w-4 flex items-center justify-center hidden">0</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <section id="store-section">
            <div class="mb-8">
                <h1 class="text-3xl font-bold mb-2 text-slate-900 tracking-tight">Nuestro Catálogo</h1>
                <p class="text-slate-500 font-medium text-sm mb-4">✨ Precios al mayor a partir de 3 piezas del mismo modelo</p>
                <div id="category-bar" class="flex gap-2 overflow-x-auto pb-4 cat-scroll"></div>
            </div>
            <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </section>

        <section id="admin-panel-section" class="hidden">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4">
                <h1 class="text-2xl font-bold text-slate-900">Gestión de Inventario</h1>
                <div class="flex gap-2">
                    <button onclick="logoutAdmin()" class="bg-white border border-slate-200 text-slate-600 px-4 py-2 rounded-lg font-medium hover:bg-slate-50">Salir</button>
                    <button onclick="switchAdminView('tickets')" class="bg-white border border-slate-300 text-slate-800 px-4 py-2 rounded-lg flex items-center gap-2 hover:bg-slate-50 shadow-sm transition-all">
                        <i data-lucide="ticket" class="w-4 h-4 text-slate-600"></i> Ver Tickets
                    </button>
                    <button onclick="openProductModal()" class="bg-slate-800 text-white px-4 py-2 rounded-lg flex items-center gap-2 hover:bg-slate-900 shadow-md transition-all">
                        <i data-lucide="plus" class="w-4 h-4"></i> Nuevo Producto
                    </button>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-x-auto">
                <table class="min-w-full divide-y divide-slate-200">
                    <thead class="bg-slate-50">
                        <tr>
                            <th class="px-6 py-4 text-left text-xs font-bold text-slate-400 uppercase tracking-wider">Imagen</th>
                            <th class="px-6 py-4 text-left text-xs font-bold text-slate-400 uppercase tracking-wider">Prenda</th>
                            <th class="px-6 py-4 text-left text-xs font-bold text-slate-400 uppercase tracking-wider">Categoría</th>
                            <th class="px-6 py-4 text-left text-xs font-bold text-slate-400 uppercase tracking-wider">Precios ($)</th>
                            <th class="px-6 py-4 text-left text-xs font-bold text-slate-400 uppercase tracking-wider">Stock</th>
                            <th class="px-6 py-4 text-right text-xs font-bold text-slate-400 uppercase tracking-wider">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="admin-product-list" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </section>

        <section id="admin-tickets-section" class="hidden">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4">
                <h1 class="text-2xl font-bold text-slate-900">Tickets Generados</h1>
                <div class="flex gap-2">
                    <button onclick="switchAdminView('inventory')" class="bg-slate-200 text-slate-700 px-4 py-2 rounded-lg font-medium hover:bg-slate-300">Volver a Inventario</button>
                </div>
            </div>
            <div id="tickets-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        <section id="admin-login-section" class="hidden flex items-center justify-center min-h-[40vh]">
            <div class="bg-white p-8 rounded-2xl shadow-xl border border-slate-100 w-full max-w-sm text-center">
                <h2 class="text-xl font-bold mb-6 text-slate-900">Acceso Administrativo</h2>
                <div class="relative mb-4">
                    <input type="password" id="admin-pass" placeholder="Contraseña" class="w-full p-3 border border-slate-200 rounded-xl text-center focus:ring-2 focus:ring-slate-400 outline-none transition-all">
                    <button type="button" onclick="togglePasswordVisibility()" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
                        <i id="password-toggle-icon" data-lucide="eye" class="w-5 h-5"></i>
                    </button>
                </div>
                <button onclick="loginAdmin()" class="w-full bg-slate-800 text-white py-3 rounded-xl font-bold hover:bg-slate-900 shadow-lg">Entrar</button>
            </div>
        </section>
    </main>

    <div id="product-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[70] flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-3xl w-full max-w-md p-8 shadow-2xl overflow-y-auto max-h-[90vh]">
            <h2 id="modal-title" class="text-xl font-bold mb-6 text-slate-900">Gestión de Prenda</h2>
            <form id="product-form" onsubmit="handleProductSubmit(event)" class="space-y-4">
                <input type="hidden" id="edit-id">
                
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Foto de la prenda</label>
                    <input type="file" id="p-image-file" accept="image/*" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-slate-300 text-xs">
                    <input type="hidden" id="p-image-base64">
                </div>

                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Nombre de la prenda</label>
                    <input type="text" id="p-name" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-slate-300">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Categoría</label>
                    <select id="p-cat" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-slate-300"></select>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">P. Detal ($)</label>
                        <input type="number" id="p-price" step="0.01" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-800 uppercase tracking-widest">P. Mayor (3+) ($)</label>
                        <input type="number" id="p-wholesale" step="0.01" required class="w-full p-3 bg-slate-100 border border-slate-300 rounded-xl outline-none font-bold">
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Stock Disponible</label>
                    <input type="number" id="p-stock" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none">
                </div>
                <div class="flex gap-3 mt-4">
                    <button type="button" onclick="closeProductModal()" class="flex-1 py-3 text-slate-400 font-bold hover:text-slate-600 transition-colors">Cancelar</button>
                    <button type="submit" class="flex-1 py-3 bg-slate-800 text-white rounded-xl font-bold shadow-lg hover:bg-slate-900 transition-all">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <div id="cart-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[60] flex justify-end hidden">
        <div class="bg-white w-full max-w-md h-full shadow-2xl flex flex-col">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-white">
                <h2 class="text-xl font-bold text-slate-900">Carrito de Compras</h2>
                <button onclick="toggleCart()" class="p-2 hover:bg-slate-100 rounded-full"><i data-lucide="x" class="w-5 h-5 text-slate-400"></i></button>
            </div>
            <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-4"></div>
            <div class="p-6 border-t border-slate-100 bg-white space-y-4">
                <div id="cart-form" class="space-y-3 p-4 bg-slate-50 rounded-2xl border border-slate-200">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Información del Cliente</p>
                    <input type="text" id="cust-name" placeholder="Nombre Completo" class="w-full p-3 text-sm border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-slate-300">
                    <input type="tel" id="cust-phone" placeholder="Número de Teléfono" class="w-full p-3 text-sm border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-slate-300">
                </div>
                <div class="flex justify-between text-lg font-bold text-slate-900">
                    <span>Total Pedido:</span>
                    <span id="cart-total" class="text-slate-900 tracking-tight">$0.00</span>
                </div>
                <button onclick="generateDigitalTicket()" class="w-full bg-slate-800 text-white py-4 rounded-xl font-bold hover:bg-slate-900 shadow-lg flex items-center justify-center gap-2 transition-all">
                    <i data-lucide="file-text" class="w-5 h-5"></i> Generar Ticket de Venta
                </button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-2xl shadow-2xl z-[100] hidden text-sm font-medium border border-slate-700"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDIp95fqGFn2mgJ_031a1Y_JfeKECKZTOk",
            authDomain: "potabilizadora-65aeb.firebaseapp.com",
            databaseURL: "https://potabilizadora-65aeb-default-rtdb.firebaseio.com",
            projectId: "potabilizadora-65aeb",
            storageBucket: "potabilizadora-65aeb.firebasestorage.app",
            messagingSenderId: "503467709475",
            appId: "1:503467709475:web:dcad5aa24d0bf9d23acd96",
            measurementId: "G-E3TE034RV5"
            };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        const CATEGORIES = [
            "Todas", "piyamas de overzide 3 piezas", "3 piezas", "2 piezas", 
            "piyamas acanalada de 2 piezas y 3 piezas", "piyamas de set", 
            "piyamas de botones 3 piezas y 2 piezas", "piyama juveniles 3 pieza", 
            "piyama de dama", "piyama de camiseta y shor", "piyama sexi de 3 pieza y 2 piezas", 
            "bata de seda con Cardigan", "blusones overzide", "suéter de dama y caballero", 
            "Shorts de jean", "Pijamas de botones de caballeros", "Conjuntos deportivos", "Conjuntos trans"
        ];
        
        const ADMIN_PASSWORD = "admin123";
        let products = [], cart = [], tickets = [], currentFilter = 'Todas', isAdminLoggedIn = false;

        function listenProducts() {
            onSnapshot(collection(db, "productos"), (snap) => {
                products = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderStore();
                renderAdminTable();
            });
        }

        function listenTickets() {
            onSnapshot(collection(db, "tickets"), (snap) => {
                tickets = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderAdminTickets();
            });
        }

        // Lógica para procesar la imagen seleccionada y convertirla a base64
        document.getElementById('p-image-file').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    document.getElementById('p-image-base64').value = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        window.togglePasswordVisibility = () => {
            const passInput = document.getElementById('admin-pass');
            const icon = document.getElementById('password-toggle-icon');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                icon.setAttribute('data-lucide', 'eye-off');
            } else {
                passInput.type = 'password';
                icon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        };

        window.handleProductSubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            // Si hay un ID de edición pero no se seleccionó una imagen nueva, se mantiene la anterior
            // La imagen se toma del input hidden que contiene el base64
            const base64Image = document.getElementById('p-image-base64').value;
            
            const data = {
                image: base64Image,
                name: document.getElementById('p-name').value,
                category: document.getElementById('p-cat').value,
                price: parseFloat(document.getElementById('p-price').value),
                wholesale: parseFloat(document.getElementById('p-wholesale').value),
                stock: parseInt(document.getElementById('p-stock').value),
                updatedAt: serverTimestamp()
            };
            try {
                if (id) await updateDoc(doc(db, "productos", id), data);
                else await addDoc(collection(db, "productos"), data);
                closeProductModal();
                showToast("✓ Inventario actualizado");
            } catch (err) { showToast("Error al guardar en la nube."); }
        };

        window.renderStore = () => {
            const grid = document.getElementById('product-grid');
            const filtered = currentFilter === 'Todas' ? products : products.filter(p => p.category === currentFilter);
            
            if(filtered.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-20 text-center text-slate-400 italic">No hay productos en esta categoría</div>`;
                return;
            }

            grid.innerHTML = filtered.map(p => `
                <div class="bg-white rounded-2xl border border-slate-200 p-4 shadow-sm hover:shadow-md transition-all group">
                    <div class="h-44 bg-slate-50 rounded-xl mb-4 flex items-center justify-center text-slate-300 relative group-hover:bg-slate-100 transition-colors overflow-hidden">
                        ${p.image ? `<img src="${p.image}" class="w-full h-full object-cover">` : `<i data-lucide="shirt" class="w-14 h-14"></i>`}
                        <span class="absolute top-2 right-2 text-[9px] font-bold px-2 py-1 bg-white/90 backdrop-blur-sm border border-slate-200 rounded-full ${p.stock > 0 ? 'text-slate-600' : 'text-rose-400'}">STOCK: ${p.stock}</span>
                    </div>
                    <h3 class="font-bold text-sm h-10 line-clamp-2 text-slate-800">${p.name}</h3>
                    <div class="mt-3 space-y-1.5">
                        <div class="flex justify-between text-xs px-1">
                            <span class="text-slate-500 font-medium">Detal:</span>
                            <span class="font-bold text-slate-800">$${p.price}</span>
                        </div>
                        <div class="flex justify-between text-xs p-1.5 bg-slate-50 rounded-lg text-slate-700 font-bold border border-slate-100">
                            <span>Mayor (3+):</span>
                            <span>$${p.wholesale || p.price}</span>
                        </div>
                    </div>
                    <button onclick="addToCart('${p.id}')" ${p.stock <= 0 ? 'disabled' : ''} class="mt-4 w-full bg-slate-800 text-white py-2.5 rounded-xl font-bold text-xs hover:bg-slate-900 disabled:bg-slate-200 transition-all shadow-sm">
                        ${p.stock > 0 ? 'Agregar al Carrito' : 'Agotado'}
                    </button>
                </div>
            `).join('');
            lucide.createIcons();
        };

        window.renderAdminTable = () => {
            const tbody = document.getElementById('admin-product-list');
            tbody.innerHTML = products.map(p => `
                <tr class="text-sm hover:bg-slate-50 transition-colors">
                    <td class="px-6 py-4">
                        <div class="w-10 h-10 bg-slate-100 rounded-lg overflow-hidden flex items-center justify-center">
                            ${p.image ? `<img src="${p.image}" class="w-full h-full object-cover">` : `<i data-lucide="image" class="w-4 h-4 text-slate-300"></i>`}
                        </div>
                    </td>
                    <td class="px-6 py-4 font-bold text-slate-700">${p.name}</td>
                    <td class="px-6 py-4 text-slate-500 text-xs uppercase tracking-tight font-medium">${p.category}</td>
                    <td class="px-6 py-4">
                        <div class="flex flex-col gap-1">
                            <span class="text-[10px] text-slate-400 font-bold uppercase">Detal: $${p.price}</span>
                            <span class="text-[10px] text-slate-900 font-black uppercase">Mayor: $${p.wholesale}</span>
                        </div>
                    </td>
                    <td class="px-6 py-4 font-bold text-slate-600">${p.stock}</td>
                    <td class="px-6 py-4 text-right">
                        <button onclick="editProduct('${p.id}')" class="text-slate-900 font-bold text-xs mr-4 hover:underline">Editar</button>
                        <button onclick="deleteProduct('${p.id}')" class="text-rose-400 font-bold text-xs hover:text-rose-600">Eliminar</button>
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        };

        window.renderAdminTickets = () => {
            const container = document.getElementById('tickets-list');
            if(tickets.length === 0) {
                container.innerHTML = `<div class="col-span-full py-20 text-center text-slate-400 italic">Historial de ventas vacío</div>`;
                return;
            }
            container.innerHTML = tickets.map(t => `
                <div class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm space-y-4 hover:border-slate-400 transition-all">
                    <div class="flex justify-between items-start border-b border-slate-100 pb-3">
                        <div>
                            <p class="text-[9px] text-slate-400 font-black uppercase tracking-widest">Cliente</p>
                            <h3 class="font-bold text-slate-900 text-base">${t.customerName}</h3>
                            <p class="text-xs text-slate-500 font-medium">${t.customerPhone}</p>
                        </div>
                        <span class="text-[9px] bg-slate-100 px-2 py-1 rounded text-slate-400 font-bold">${t.date}</span>
                    </div>
                    <div class="space-y-2">
                        ${t.items.map(i => `
                            <div class="flex justify-between text-xs font-medium">
                                <span class="text-slate-500">${i.qty}x ${i.name}</span>
                                <span class="text-slate-800 font-bold">$${(i.price * i.qty).toFixed(2)}</span>
                            </div>
                        `).join('')}
                    </div>
                    <div class="flex justify-between items-center pt-4 border-t border-slate-100">
                        <span class="text-xs font-black text-slate-400 uppercase tracking-widest">Monto Total</span>
                        <span class="text-xl font-black text-slate-900 tracking-tight">$${t.total.toFixed(2)}</span>
                    </div>
                    <button onclick="deleteTicket('${t.id}')" class="w-full text-[10px] text-slate-400 font-bold py-2.5 hover:text-rose-500 hover:bg-rose-50 rounded-xl transition-all">BORRAR REGISTRO</button>
                </div>
            `).sort((a,b) => b.timestamp - a.timestamp).join('');
        };

        window.addToCart = (id) => {
            const p = products.find(x => x.id === id);
            const inCart = cart.find(x => x.id === id);
            if (inCart) {
                if(inCart.qty < p.stock) inCart.qty++;
                else return showToast("Stock máximo alcanzado");
            } else cart.push({ ...p, qty: 1 });
            updateCartUI();
            showToast("✓ Agregado al carrito");
        };

        function updateCartUI() {
            let total = 0;
            const container = document.getElementById('cart-items');
            if(cart.length === 0) {
                container.innerHTML = `<div class="flex flex-col items-center justify-center py-20 opacity-30"><i data-lucide="shopping-cart" class="w-12 h-12 mb-2"></i><p class="text-sm font-bold uppercase tracking-widest">Vacío</p></div>`;
            } else {
                container.innerHTML = cart.map((item, idx) => {
                    const isWholesale = item.qty >= 3;
                    const price = isWholesale ? (item.wholesale || item.price) : item.price;
                    const subtotal = price * item.qty;
                    total += subtotal;
                    return `
                    <div class="bg-slate-50 p-4 rounded-2xl border border-slate-200">
                        <div class="flex justify-between font-bold text-xs mb-1 text-slate-900"><span>${item.name}</span><span>$${subtotal.toFixed(2)}</span></div>
                        <div class="flex justify-between items-center mt-3">
                            <span class="text-[9px] text-slate-400 font-black uppercase tracking-tight">$${price} c/u ${isWholesale ? '(Mayor)' : '(Detal)'}</span>
                            <div class="flex items-center gap-3">
                                <button onclick="updateQty(${idx}, -1)" class="w-7 h-7 bg-white rounded-lg border border-slate-200 flex items-center justify-center hover:bg-slate-100 transition-colors">-</button>
                                <span class="text-xs font-bold text-slate-800">${item.qty}</span>
                                <button onclick="updateQty(${idx}, 1)" class="w-7 h-7 bg-white rounded-lg border border-slate-200 flex items-center justify-center hover:bg-slate-100 transition-colors">+</button>
                            </div>
                        </div>
                    </div>`;
                }).join('');
            }
            document.getElementById('cart-count').innerText = cart.reduce((s, i) => s + i.qty, 0);
            document.getElementById('cart-count').classList.toggle('hidden', cart.length === 0);
            document.getElementById('cart-total').innerText = `$${total.toFixed(2)}`;
            lucide.createIcons();
        }

        window.updateQty = (idx, delta) => {
            const item = cart[idx];
            const p = products.find(x => x.id === item.id);
            if(delta > 0 && item.qty >= p.stock) return;
            item.qty += delta;
            if (item.qty <= 0) cart.splice(idx, 1);
            updateCartUI();
        };

        window.generateDigitalTicket = async () => {
            const name = document.getElementById('cust-name').value.trim();
            const phone = document.getElementById('cust-phone').value.trim();
            if(!name || !phone) return showToast("Faltan datos de contacto");
            if(cart.length === 0) return showToast("El carrito está vacío");
            let total = 0;
            const itemsToSave = cart.map(item => {
                const isWholesale = item.qty >= 3;
                const price = isWholesale ? (item.wholesale || item.price) : item.price;
                total += (price * item.qty);
                return { name: item.name, qty: item.qty, price: price };
            });
            const ticketData = {
                customerName: name, customerPhone: phone, items: itemsToSave,
                total: total, date: new Date().toLocaleString(), timestamp: Date.now()
            };
            try {
                await addDoc(collection(db, "tickets"), ticketData);
                const ticketWindow = window.open('', '_blank');
                ticketWindow.document.write(`<html><head><title>Ticket - FashionStock</title><style>body { font-family: sans-serif; padding: 40px; color: #1e293b; background: #f8fafc; } .ticket { max-width: 400px; margin: auto; background: white; border: 1px solid #e2e8f0; padding: 40px; border-radius: 24px; } .logo { font-size: 24px; font-weight: 800; color: #0f172a; text-transform: uppercase; text-align:center; margin-bottom:30px; } .total { margin-top: 30px; padding-top: 20px; border-top: 3px solid #0f172a; font-size: 20px; font-weight: 900; display: flex; justify-content: space-between; }</style></head><body><div class="ticket"><div class="logo">FashionStock</div><div><strong>Cliente:</strong> ${name}<br><strong>Tel:</strong> ${phone}</div><hr style="margin:20px 0; border:none; border-top:1px dashed #eee;">${itemsToSave.map(i => `<div style="display:flex; justify-content: space-between; font-size:13px; margin-bottom:5px;"><span>${i.qty}x ${i.name}</span><span style="font-weight:700">$${(i.price*i.qty).toFixed(2)}</span></div>`).join('')}<div class="total"><span>TOTAL</span><span>$${total.toFixed(2)}</span></div></div></body></html>`);
                ticketWindow.document.close();
                cart = []; updateCartUI(); toggleCart(); showToast("🎟️ Ticket generado");
            } catch (err) { showToast("Error al procesar la venta."); }
        };

        window.switchAdminView = (view) => {
            if(view === 'tickets') {
                document.getElementById('admin-panel-section').classList.add('hidden');
                document.getElementById('admin-tickets-section').classList.remove('hidden');
            } else {
                document.getElementById('admin-tickets-section').classList.add('hidden');
                document.getElementById('admin-panel-section').classList.remove('hidden');
            }
            lucide.createIcons();
        };

        window.deleteTicket = async (id) => { if(confirm("¿Eliminar registro?")) await deleteDoc(doc(db, "tickets", id)); };
        
        window.editProduct = (id) => {
            const p = products.find(x => x.id === id);
            document.getElementById('edit-id').value = p.id;
            document.getElementById('p-image-base64').value = p.image || "";
            document.getElementById('p-name').value = p.name;
            document.getElementById('p-cat').value = p.category;
            document.getElementById('p-price').value = p.price;
            document.getElementById('p-wholesale').value = p.wholesale || p.price;
            document.getElementById('p-stock').value = p.stock;
            document.getElementById('modal-title').innerText = "Editar Prenda";
            document.getElementById('product-modal').classList.remove('hidden');
        };

        window.deleteProduct = async (id) => { if (confirm("¿Eliminar producto?")) await deleteDoc(doc(db, "productos", id)); };
        window.openProductModal = () => { document.getElementById('product-form').reset(); document.getElementById('edit-id').value = ""; document.getElementById('p-image-base64').value = ""; document.getElementById('modal-title').innerText = "Nueva Prenda"; document.getElementById('product-modal').classList.remove('hidden'); };
        window.closeProductModal = () => document.getElementById('product-modal').classList.add('hidden');
        window.toggleCart = () => document.getElementById('cart-modal').classList.toggle('hidden');
        window.switchTab = (tab) => { 
            ['store-section', 'admin-login-section', 'admin-panel-section', 'admin-tickets-section'].forEach(id => document.getElementById(id).classList.add('hidden')); 
            document.getElementById(tab + '-section').classList.remove('hidden'); 
            lucide.createIcons(); 
        };
        window.loginAdmin = () => { if (document.getElementById('admin-pass').value === ADMIN_PASSWORD) { isAdminLoggedIn = true; switchTab('admin-panel'); } else showToast("Acceso denegado."); };
        window.logoutAdmin = () => { isAdminLoggedIn = false; switchTab('store'); };
        window.checkAdminAuth = () => isAdminLoggedIn ? switchTab('admin-panel') : switchTab('admin-login');
        window.filterCat = (c) => { currentFilter = c; renderCats(); renderStore(); };

        function renderCats() {
            document.getElementById('category-bar').innerHTML = CATEGORIES.map(c => `
                <button onclick="filterCat('${c}')" class="px-4 py-2 rounded-xl text-[10px] font-black whitespace-nowrap border uppercase tracking-widest transition-all ${currentFilter === c ? 'bg-slate-800 text-white border-slate-800' : 'bg-white text-slate-400 border-slate-200 hover:border-slate-400'}">
                    ${c}
                </button>
            `).join('');
        }

        function populateCatSelect() {
            document.getElementById('p-cat').innerHTML = CATEGORIES.filter(c => c !== 'Todas').map(c => `<option value="${c}">${c}</option>`).join('');
        }

        function showToast(msg) {
            const t = document.getElementById('toast'); t.innerText = msg; t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 2000);
        }

        window.onload = () => {
            renderCats();
            populateCatSelect();
            if (firebaseConfig.apiKey) {
                listenProducts();
                listenTickets();
            }
            lucide.createIcons();
        };
    </script>
</body>
</html>
